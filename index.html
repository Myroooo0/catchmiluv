<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch My Love 💖</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #ffe4f0 0%, #fff0fa 50%, #ffeaf5 100%);
    min-height: 100vh;
    padding: 1.2rem;
  }

  h1 {
    font-family: 'Pacifico', cursive;
    font-size: 26px;
    color: #c9416e;
    text-align: center;
    margin-bottom: 4px;
    text-shadow: 2px 2px 0px #ffc0d8;
  }
  .subtitle {
    text-align: center;
    font-size: 12px;
    color: #c9416e99;
    margin-bottom: 14px;
    letter-spacing: 0.05em;
  }

  /* ── STATS ── */
  #stats {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .pill {
    background: #fff;
    border: 1.5px solid #f5b8d0;
    border-radius: 999px;
    padding: 5px 16px;
    font-size: 13px;
    color: #b03060;
    font-weight: 600;
    box-shadow: 0 2px 8px #f5b8d030;
  }
  .pill span { color: #c9416e; font-size: 16px; }

  /* ── TIMER BAR ── */
  #timerbar-wrap {
    width: 100%; max-width: 560px; margin: 0 auto 10px;
    height: 7px; background: #fcd5e5; border-radius: 999px; overflow: hidden;
  }
  #timerbar {
    height: 7px; background: linear-gradient(90deg,#f76ba0,#c9416e);
    border-radius: 999px; width: 100%; transition: width 1s linear;
  }

  /* ── ARENA ── */
  #arena {
    position: relative;
    width: 100%; max-width: 560px;
    height: 400px;
    margin: 0 auto;
    background: linear-gradient(180deg, #fff5fa 0%, #ffe9f3 100%);
    border: 2px solid #f5b8d0;
    border-radius: 24px;
    overflow: hidden;
    cursor: none;
    box-shadow: 0 8px 40px #f5b8d040;
    touch-action: none;
  }

  /* sparkle bg dots */
  #arena::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, #f9c0d8 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.35;
    pointer-events: none;
  }

  /* ── SCREEN OVERLAY ── */
  #screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    background: rgba(255,245,250,0.97);
    border-radius: 22px;
    z-index: 20;
  }
  #screen h3 {
    font-family: 'Pacifico', cursive;
    font-size: 22px; color: #c9416e;
    text-shadow: 1px 1px 0 #ffc0d8;
  }
  #screen p {
    font-size: 13px; color: #b03060;
    text-align: center; max-width: 280px; line-height: 1.7;
  }
  #screen button {
    padding: 10px 28px;
    font-size: 14px; font-family: 'Nunito', sans-serif; font-weight: 700;
    cursor: pointer;
    border-radius: 999px;
    border: none;
    background: linear-gradient(135deg, #f76ba0, #c9416e);
    color: #fff;
    box-shadow: 0 4px 16px #f76ba050;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #screen button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px #f76ba070; }

  /* ── CATCHER ── */
  #catcher {
    position: absolute;
    bottom: 14px;
    width: 76px; height: 76px;
    border-radius: 50%;
    border: 3px solid #f76ba0;
    background: #ffe4f0;
    overflow: hidden;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 5;
    box-shadow: 0 0 0 4px #ffc0d840, 0 4px 20px #f76ba040;
  }
  #catcher img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  /* ── FALLING ITEMS ── */
  .drop-item {
    position: absolute;
    top: -70px;
    width: 56px; height: 56px;
    border-radius: 50%;
    overflow: hidden;
    pointer-events: none;
    z-index: 4;
    border: 2.5px solid #fff;
    box-shadow: 0 4px 16px #00000020;
  }
  .drop-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  /* ── FLASH ── */
  #flash {
    position: absolute; inset: 0;
    background: #F7C1C1;
    opacity: 0;
    border-radius: 22px;
    pointer-events: none;
    z-index: 6;
    transition: opacity 0.1s;
  }

  /* ── CUSTOM CURSOR ── */
  #cursor-dot {
    position: fixed;
    width: 10px; height: 10px;
    background: #f76ba0;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%,-50%);
    transition: transform 0.05s;
    box-shadow: 0 0 8px #f76ba080;
  }

  /* ── BUTTONS ── */
  #btnrow {
    display: flex; gap: 10px; justify-content: center;
    margin-top: 12px;
    max-width: 560px; margin-left: auto; margin-right: auto;
  }
  #btnrow button {
    font-size: 13px; font-family: 'Nunito', sans-serif; font-weight: 700;
    cursor: pointer; padding: 7px 20px;
    border-radius: 999px;
    border: 1.5px solid #f5b8d0;
    background: #fff;
    color: #c9416e;
    transition: background 0.15s, transform 0.1s;
  }
  #btnrow button:hover { background: #fff0f7; transform: translateY(-1px); }

  /* ── LEGEND ── */
  #legend {
    display: flex; gap: 12px; justify-content: center;
    margin-top: 10px;
    font-size: 12px; color: #c9416e;
    font-weight: 600;
  }
  #legend span { display: flex; align-items: center; gap: 5px; }
  .leg-dot {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid #f5b8d0;
    background: #ffe4f0;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
  }
</style>
</head>
<body>

<div id="cursor-dot"></div>

<h1>Catch My Love 💖</h1>
<p class="subtitle">catch the good ones · dodge the bad ones</p>

<div id="stats">
  <div class="pill">Score <span id="sv">0</span></div>
  <div class="pill">Best <span id="bv">0</span></div>
  <div class="pill">Time <span id="tv">30</span>s</div>
</div>

<div id="timerbar-wrap"><div id="timerbar"></div></div>

<div id="arena">
  <div id="flash"></div>

  <!-- ═══════════════════════════════════════════
       CATCHER IMAGE
       Replace the src below with your own photo.
       Recommended: a square photo of your loved one.
       Example: src="my_photo.jpg"
  ═══════════════════════════════════════════ -->
  <div id="catcher" style="left:50%;">
    <img id="catcher-img"
         src="https://placehold.co/76x76/ffc0d8/c9416e?text=You"
         alt="Catcher">
  </div>

  <div id="screen">
    <div style="font-size:48px;">💖</div>
    <h3>Catch My Love!</h3>
    <p>Move your mouse to catch the good photos.<br>Avoid the wrong ones — they cost 3 points!</p>
    <button id="start-btn">▶ Start Game</button>
  </div>
</div>

<div id="legend" style="margin-top:10px;">
  <span><div class="leg-dot">✓</div> Catch these (+1)</span>
  <span><div class="leg-dot">✕</div> Dodge these (-3)</span>
</div>

<div id="btnrow" style="margin-top:10px;">
  <button id="restart-btn">↺ Restart</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  IMAGES TO CATCH (5 images) — Replace each src with your own.
//  Use relative paths (e.g. "photo1.jpg") or full URLs.
// ═══════════════════════════════════════════════════════════
const CATCH_IMAGES = [
  { src: "https://github.com/Myroooo0/catchmiluv/blob/main/IMG20240607114347.jpg?raw=true", label: "Catch 1" },
  { src: "https://github.com/Myroooo0/catchmiluv/blob/main/IMG_20250305_190926.jpg?raw=true", label: "Catch 2" },
  { src: "https://github.com/Myroooo0/catchmiluv/blob/main/IMG_20250305_191323.jpg?raw=true", label: "Catch 3" },
  { src: "https://github.com/Myroooo0/catchmiluv/blob/main/IMG_20260517_203703.jpg?raw=true", label: "Catch 4" },
  { src: "https://github.com/Myroooo0/catchmiluv/blob/main/IMG_20260517_203755.jpg?raw=true", label: "Catch 5" },
];

// ═══════════════════════════════════════════════════════════
//  IMAGES TO DODGE (2 images) — Replace each src with your own.
//  These look the same as catch images — cost -3 points if caught.
// ═══════════════════════════════════════════════════════════
const DODGE_IMAGES = [
  { src: "https://github.com/Myroooo0/catchmiluv/blob/main/dp.jpg?raw=true", label: "Dodge 1" },
  { src: "https://github.com/Myroooo0/catchmiluv/blob/main/jr.jpg?raw=true", label: "Dodge 2" },
];

// ═══════════════════════════════════════════════════════════
//  CATCHER IMAGE — Replace with your own photo path.
//  Example: const CATCHER_SRC = "my_love.jpg";
// ═══════════════════════════════════════════════════════════
const CATCHER_SRC = "https://github.com/Myroooo0/catchmiluv/blob/main/vhenuza.jpg?raw=true";

// ═══════════════════════════════════════════════════════════
//  GAME SETTINGS
// ═══════════════════════════════════════════════════════════
const TOTAL_TIME    = 30;   // seconds per round
const SPAWN_RATE    = 700;  // ms between drops
const DODGE_CHANCE  = 0.22; // 0.0 – 1.0 chance a drop is a dodge image
const BASE_SPEED    = 1.9;  // px per frame
const SPEED_BOOST   = 0.028; // extra speed per point scored

// ─── internals ───────────────────────────────
const arena   = document.getElementById('arena');
const flash   = document.getElementById('flash');
const sv      = document.getElementById('sv');
const bv      = document.getElementById('bv');
const tv      = document.getElementById('tv');
const bar     = document.getElementById('timerbar');
const cursor  = document.getElementById('cursor-dot');
const catcherEl = document.getElementById('catcher');

document.getElementById('catcher-img').src = CATCHER_SRC;

let score=0, best=0, timeLeft=TOTAL_TIME, running=false;
let catchX = arena.clientWidth / 2;
let spawnInt, tickInt, rafId;
let drops = [];

// custom cursor
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// catcher follow
arena.addEventListener('mousemove', e => {
  if (!running) return;
  const rect = arena.getBoundingClientRect();
  catchX = Math.max(38, Math.min(rect.width - 38, e.clientX - rect.left));
  catcherEl.style.left = catchX + 'px';
});
arena.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!running) return;
  const rect = arena.getBoundingClientRect();
  catchX = Math.max(38, Math.min(rect.width - 38, e.touches[0].clientX - rect.left));
  catcherEl.style.left = catchX + 'px';
}, { passive: false });

function showScreen(html) {
  let s = document.getElementById('screen');
  if (!s) { s = document.createElement('div'); s.id = 'screen'; arena.appendChild(s); }
  s.style.display = 'flex';
  s.innerHTML = html;
}
function hideScreen() {
  const s = document.getElementById('screen');
  if (s) s.style.display = 'none';
}

function spawnDrop() {
  if (!running) return;
  const isDodge = Math.random() < DODGE_CHANCE;
  const pool    = isDodge ? DODGE_IMAGES : CATCH_IMAGES;
  const imgData = pool[Math.floor(Math.random() * pool.length)];

  const wrap = document.createElement('div');
  wrap.className = 'drop-item';

  const img = document.createElement('img');
  img.src = imgData.src;
  img.alt = imgData.label;
  wrap.appendChild(img);

  const x = 28 + Math.random() * (arena.clientWidth - 56);
  wrap.style.left = x + 'px';
  arena.appendChild(wrap);

  const speed = BASE_SPEED + score * SPEED_BOOST;
  drops.push({ el: wrap, x, y: -70, speed, isDodge });
}

function gameLoop() {
  if (!running) return;
  const arenaH  = arena.clientHeight;
  const catcherY = arenaH - 14 - 38;

  drops = drops.filter(d => {
    d.y += d.speed;
    d.el.style.top = d.y + 'px';

    const dx = Math.abs(d.x - catchX);
    const dy = Math.abs((d.y + 28) - catcherY);

    if (dx < 52 && dy < 52) {
      d.el.remove();
      if (d.isDodge) {
        score = Math.max(0, score - 3);
        sv.textContent = score;
        flash.style.opacity = '0.55';
        setTimeout(() => flash.style.opacity = '0', 200);
        pop(catchX, catcherY - 30, '-3', '#a32d2d');
      } else {
        score += 1;
        sv.textContent = score;
        pop(catchX, catcherY - 30, '+1', '#3B6D11');
      }
      return false;
    }
    if (d.y > arenaH + 20) { d.el.remove(); return false; }
    return true;
  });

  rafId = requestAnimationFrame(gameLoop);
}

function pop(x, y, txt, color) {
  const p = document.createElement('div');
  p.style.cssText = `position:absolute;left:${x - 14}px;top:${y}px;font-size:16px;font-weight:700;font-family:'Nunito',sans-serif;color:${color};pointer-events:none;z-index:9;transition:opacity .5s,transform .5s;`;
  p.textContent = txt;
  arena.appendChild(p);
  setTimeout(() => { p.style.opacity = '0'; p.style.transform = 'translateY(-30px)'; }, 30);
  setTimeout(() => p.remove(), 600);
}

function startGame() {
  drops.forEach(d => d.el.remove()); drops = [];
  score = 0; timeLeft = TOTAL_TIME;
  sv.textContent = '0'; tv.textContent = TOTAL_TIME; bar.style.width = '100%';
  hideScreen();
  running = true;
  catchX = arena.clientWidth / 2; catcherEl.style.left = catchX + 'px';
  clearInterval(spawnInt); clearInterval(tickInt); cancelAnimationFrame(rafId);
  spawnInt = setInterval(spawnDrop, SPAWN_RATE);
  tickInt  = setInterval(() => {
    timeLeft--;
    tv.textContent = timeLeft;
    bar.style.width = Math.round(timeLeft / TOTAL_TIME * 100) + '%';
    if (timeLeft <= 0) endGame();
  }, 1000);
  rafId = requestAnimationFrame(gameLoop);
}

function endGame() {
  running = false;
  clearInterval(spawnInt); clearInterval(tickInt); cancelAnimationFrame(rafId);
  drops.forEach(d => d.el.remove()); drops = [];
  if (score > best) { best = score; bv.textContent = best; }
  const msg = score >= 20 ? 'You caught them all — so in love! 💖'
            : score >= 10 ? 'Great catch! Try again? 🌸'
            : 'D mo n q luv :<';
  showScreen(`
    <div style="font-size:44px;">🏆</div>
    <h3>Time's Up!</h3>
    <p style="font-size:15px;font-weight:700;color:#c9416e;">Score: ${score} &nbsp;·&nbsp; Best: ${best}</p>
    <p>${msg}</p>
    <button onclick="startGame()">↺ Play Again</button>
  `);
}

document.getElementById('start-btn').onclick = startGame;
document.getElementById('restart-btn').onclick = () => {
  running = false;
  clearInterval(spawnInt); clearInterval(tickInt); cancelAnimationFrame(rafId);
  drops.forEach(d => d.el.remove()); drops = [];
  sv.textContent = '0'; tv.textContent = TOTAL_TIME; bar.style.width = '100%';
  showScreen(`
    <div style="font-size:48px;">💖</div>
    <h3>Catch My Love!</h3>
    <p>Move your mouse to catch the good photos.<br>Avoid the wrong ones — they cost 3 points!</p>
    <button onclick="startGame()">▶ Start Game</button>
  `);
};
</script>
</body>
</html>
